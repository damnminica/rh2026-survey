<title>JKT48 RH2026 · Setlist Survey</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0A0808;color:#F9FAFB;font-family:'Segoe UI',Arial,sans-serif;min-height:100vh}
.wrap{max-width:620px;margin:0 auto;padding:14px}

.sdot.done{background:#B0143C;border:1px solid #B0143C;color:#FFF}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px}
.popup{background:#1C0D12;border:1px solid #3D1A26;border-radius:12px;padding:20px;max-width:340px;width:100%}

.step-btn{width:40px;height:40px;border-radius:50%;border:1px solid #3D1A26;background:#2A1520;color:#F9FAFB;font-size:22px;cursor:pointer;line-height:1}

.pop-btns{display:flex;gap:8px;margin-top:14px}

.ritem.top3{background:#2A1520;border-color:#3D1A26}
.rank{font-size:10px;font-weight:700;min-width:18px;text-align:center;flex-shrink:0}
.r1{color:#FFD700}.r2{color:#C0C0C0}.r3{color:#CD7F32}.rn{color:#9CA3AF}
.rinfo{flex:1;min-width:0}
.rtitle{font-size:11px;font-weight:600;line-height:1.3;margin-bottom:1px}
.rmem{font-size:9px;color:#6B7280}
.bwrap{min-width:70px;height:4px;background:#2A1520;border-radius:2px;overflow:hidden}
.bfill{height:100%;border-radius:2px}
.rpct{font-size:10px;color:#9CA3AF;min-width:36px;text-align:right}
.gdesc{font-size:11px;color:#9CA3AF;margin-bottom:10px;line-height:1.5}
.loading{display:flex;align-items:center;justify-content:center;min-height:180px;color:#9CA3AF;font-size:13px;gap:8px}
.spin{width:16px;height:16px;border:2px solid #3D1A26;border-top-color:#B0143C;border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
@media(max-width:480px){.wrap{padding:10px}}
</style>

const PRED_SONGS=[

{id:44,song:"Oshibe to Meshibe New Era Ver. / Benang Sari, Putik, dan Kupu-Kupu Malam",members:"Marsha Lenathea, Greesella Adhalia, Oline Manuel, Grace Octaviani, Aulia Riza"},
{id:45,song:"Suki Suki Skip / Suka Suka Skip",members:"Dena Natalia, Desy Natalia, Greesella Adhalia, Gendis Mayrannisa, Alya Amanda, Anindya Ramadhani, Cathleen Nixie, Celline Thefani, Cynthia Yaputera, Grace Octaviani, Michelle Alexandra"},
{id:46,song:"Nage Kiss de Uchi Otose / Jatuhkan dengan Kiss-Bye",members:"Freya Jayawardana, Angelina Christy, Mutiara Azzahra, Febriola Sinambela, Jessica Chandra, Helisma Putri"},
{id:47,song:"Shinkirou / Khayalan",members:"Gabriela Abigail, Lulu Salsabila"},
{id:48,song:"Menanti",members:"Cathleen Nixie"},
{id:49,song:"Heart Gata Virus / Virus Tipe Hati",members:"Hagia Sophia, Humaira Ramadhani, Astrella Virgiananda"},
{id:50,song:"Dua Orang yang Terlarang / Kinjirareta Futari",members:"Catherina Vallencia, Oline Manuel"},
{id:51,song:"12 Seconds / 12Byou",members:"Fiony Alveria, Indah Cahya, Aurellia, Alya Amanda, Anindya Ramadhani, Cathleen Nixie, Celline Thefani, Cynthia Yaputera, Grace Octaviani, Michelle Alexandra, Aurhel Alana, Jazzlyn Trisha, Fritzy Rosmerian, Hillary Abigail, Nayla Suji"},
{id:52,song:"Hubungan Kau Dan Aku / Kimi to Boku no Kankei",members:"Celine Thefani"}
];

let HARAPAN_SONGS=[];
const MAX_H=3;

// STATE — plain object, no Set/Map weirdness
const st={
  step:'intro', vStep:0,
  prediksi:{}, harapan:{},
  results:null, loading:false,
  vid:null, voted:false, tab:'p',
  qP:'', qH:'',
  popId:null, popTmp:0
};

// helpers
const totalP=()=>Object.values(st.prediksi).reduce((a,b)=>a+b,0);
const rem=()=>10-totalP();
const uid=()=>Math.random().toString(36).slice(2)+Date.now().toString(36);
const h=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

async function api(path,opts){
  const r=await fetch(path,opts);
  const text=await r.text();
  if(!r.ok)throw new Error(text);
  return JSON.parse(text);
}

// ---- POPUP ----
let popSong=null;
function openPopup(id){
  popSong=PRED_SONGS[id-1];
  st.popTmp=st.prediksi[id]||0;
  document.getElementById('pop-title').textContent=popSong.song;
  document.getElementById('pop-mem').textContent=popSong.members;
  refreshPopup();
  document.getElementById('overlay').style.display='flex';
}
function refreshPopup(){
  const prev=popSong?st.prediksi[popSong.id]||0:0;
  const avail=rem()+prev;
  document.getElementById('pop-num').textContent=st.popTmp;
  document.getElementById('pop-sisa').textContent=avail-st.popTmp;
  document.getElementById('pop-minus').disabled=st.popTmp<=0;
  document.getElementById('pop-plus').disabled=avail-st.popTmp<=0;
}
function closePopup(){
  document.getElementById('overlay').style.display='none';
  popSong=null;
}
document.getElementById('overlay').addEventListener('click',function(e){
  if(e.target===this)closePopup();
});
document.getElementById('pop-cancel').addEventListener('click',closePopup);
document.getElementById('pop-minus').addEventListener('click',function(){
  if(st.popTmp>0){st.popTmp--;refreshPopup();}
});
document.getElementById('pop-plus').addEventListener('click',function(){
  const prev=popSong?st.prediksi[popSong.id]||0:0;
  if(rem()+prev-st.popTmp>0){st.popTmp++;refreshPopup();}
});
document.getElementById('pop-apply').addEventListener('click',function(){
  if(!popSong)return;
  if(st.popTmp===0)delete st.prediksi[popSong.id];
  else st.prediksi[popSong.id]=st.popTmp;
  closePopup();
  render();
});

// ---- EVENT DELEGATION ---- (no inline onclick needed)
document.addEventListener('click',function(e){
  const card=e.target.closest('[data-action]');
  if(!card)return;
  const action=card.dataset.action;

  if(action==='pred-card'){
    const id=parseInt(card.dataset.id);
    openPopup(id);
  }
  if(action==='harap-card'){
    const code=card.dataset.code;
    if(st.harapan[code])delete st.harapan[code];
    else if(Object.keys(st.harapan).length<MAX_H)st.harapan[code]=1;
    render();
  }
  if(action==='btn-start'){
    if(st.voted){loadResults();return;}
    st.step='voting';st.vStep=0;render();
  }
  if(action==='btn-results'){loadResults();}
  if(action==='btn-back-intro'){st.step='intro';render();}
  if(action==='btn-back-pred'){st.vStep=0;render();}
  if(action==='btn-next-harap'){
    if(totalP()===10){st.vStep=1;render();}
  }
  if(action==='btn-submit'){submitVote();}
  if(action==='btn-refresh'){loadResults();}
  if(action==='btn-vote-now'){st.step='voting';st.vStep=0;render();}
  if(action==='tab'){
    st.tab=card.dataset.tab;render();
  }
});

// ---- SEARCH ----
document.addEventListener('input',function(e){
  if(e.target.id==='sqP'){st.qP=e.target.value;renderList();}
  if(e.target.id==='sqH'){st.qH=e.target.value;renderList();}
});

function renderList(){
  const el=document.getElementById('song-list');
  if(!el)return;
  el.innerHTML=buildList();
}

function buildList(){
  if(st.vStep===0){
    const q=st.qP.toLowerCase();
    const songs=q?PRED_SONGS.filter(s=>s.song.toLowerCase().includes(q)||s.members.toLowerCase().includes(q)):PRED_SONGS;
    if(!songs.length)return '<div class="noresult">Tidak ada hasil</div>';
    return songs.map(function(s){
      const v=st.prediksi[s.id]||0;
      return '<div class="scard '+(v>0?'has-votes':'')+'" data-action="pred-card" data-id="'+s.id+'">'+
        '<span class="snum">'+s.id+'</span>'+
        '<div class="sinfo">'+
          '<div class="stitle">'+h(s.song)+'</div>'+
          '<div class="smem">'+h(s.members)+'</div>'+
        '</div>'+
        (v>0?'<span class="vbadge">'+v+' suara</span>':'')+
      '</div>';
    }).join('');
  } else {
    const q=st.qH.toLowerCase();
    const songs=q?HARAPAN_SONGS.filter(function(s){
      return s.id.toLowerCase().includes(q)||(s.jp&&s.jp.toLowerCase().includes(q));
    }):HARAPAN_SONGS;
    if(!songs.length)return '<div class="noresult">Tidak ada hasil</div>';
    const keys=Object.keys(st.harapan);
    return songs.map(function(s){
      const sel=!!st.harapan[s.code];
      const dis=!sel&&keys.length>=MAX_H;
      return '<div class="scard '+(sel?'sel-h':'')+(dis?' dim':'')+'" '+
        (dis?'':'data-action="harap-card" data-code="'+h(s.code)+'"')+'>'+
        '<div class="sinfo">'+
          '<div class="stitle">'+h(s.id)+'</div>'+
          (s.jp?'<div class="smem">'+h(s.jp)+'</div>':'')+
        '</div>'+
        (sel?'<span class="chk">&#10003;</span>':'')+
      '</div>';
    }).join('');
  }
}

// ---- API ----
async function submitVote(){
  if(totalP()!==10){alert('Total suara harus tepat 10. Saat ini: '+totalP());return;}
  st.loading=true;render();
  try{
    const r=await api('/api/vote',{method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({vid:st.vid,p:st.prediksi,h:Object.keys(st.harapan)})});
    st.results=r.results||await api('/api/results');
    st.voted=true;st.step='results';
  }catch(e){
    if(e.message.includes('already_voted')){
      st.voted=true;
      st.results=await api('/api/results');
      st.step='results';
    } else {
      alert('Gagal: '+e.message);
    }
  }
  st.loading=false;render();
}

async function loadResults(){
  st.loading=true;render();
  try{st.results=await api('/api/results');}catch{}
  st.step='results';st.loading=false;render();
}

// ---- RENDER RESULTS ----
function buildResults(){
  const r=st.results;
  if(!r)return'<div class="loading"><div class="spin"></div> Memuat...</div>';
  if(!r.total)return'<div class="noresult" style="padding:32px 0">Belum ada vote.</div>';

  if(st.tab==='p'){
    const ranked=PRED_SONGS.map(function(s){return{s:s,cnt:r.pc[s.id]||0};})
      .filter(function(x){return x.cnt>0;}).sort(function(a,b){return b.cnt-a.cnt;});
    if(!ranked.length)return'<div class="noresult" style="padding:24px 0">Belum ada data.</div>';
    const mx=ranked[0].cnt||1;
    return ranked.map(function(x,i){
      const rk=i===0?'r1':i===1?'r2':i===2?'r3':'rn';
      return'<div class="ritem '+(i<3?'top3':'')+'">'+
        '<span class="rank '+rk+'">#'+(i+1)+'</span>'+
        '<div class="rinfo"><div class="rtitle">'+h(x.s.song)+'</div>'+
        '<div class="rmem">'+h(x.s.members)+'</div></div>'+
        '<div class="bwrap"><div class="bfill" style="width:'+Math.round(x.cnt/mx*100)+'%;background:#B0143C"></div></div>'+
        '<span class="rpct">'+x.cnt+' suara</span>'+
      '</div>';
    }).join('');
  }

  if(st.tab==='h'){
    const hkeys=Object.keys(r.hc);
    if(!hkeys.length)return'<div class="noresult" style="padding:24px 0">Belum ada data.</div>';
    const ranked=hkeys.map(function(code){
      const song=HARAPAN_SONGS.find(function(s){return s.code===code;})||{id:code,jp:''};
      return{code:code,song:song,cnt:r.hc[code],pct:r.hc[code]/r.total};
    }).sort(function(a,b){return b.cnt-a.cnt;}).slice(0,30);
    const mx=ranked[0]?ranked[0].pct:1;
    return ranked.map(function(x,i){
      const rk=i===0?'r1':i===1?'r2':i===2?'r3':'rn';
      return'<div class="ritem '+(i<3?'top3':'')+'">'+
        '<span class="rank '+rk+'">#'+(i+1)+'</span>'+
        '<div class="rinfo"><div class="rtitle">'+h(x.song.id)+'</div>'+
        (x.song.jp?'<div class="rmem">'+h(x.song.jp)+'</div>':'')+
        '</div>'+
        '<div class="bwrap"><div class="bfill" style="width:'+Math.round(x.pct/mx*100)+'%;background:#3B82F6"></div></div>'+
        '<span class="rpct">'+Math.round(x.pct*100)+'%</span>'+
      '</div>';
    }).join('');
  }

  if(st.tab==='gap'){
    const gapped=Object.keys(r.hc).map(function(code){
      const song=HARAPAN_SONGS.find(function(s){return s.code===code;})||{id:code,jp:''};
      const hp=r.hc[code]/r.total;
      const pp=0;
      return{code:code,song:song,hp:hp,pp:pp,gap:hp};
    }).filter(function(x){return x.gap>0;})
      .sort(function(a,b){return b.gap-a.gap;}).slice(0,20);
    if(!gapped.length)return'<div class="noresult" style="padding:24px 0">Belum ada cukup data.</div>';
    return'<div class="gdesc">Lagu dari 419 daftar yang paling banyak diharap fans.</div>'+
    gapped.map(function(x,i){
      const rk=i===0?'r1':i===1?'r2':i===2?'r3':'rn';
      return'<div class="ritem '+(i<3?'top3':'')+'">'+
        '<span class="rank '+rk+'" style="color:#C084FC">#'+(i+1)+'</span>'+
        '<div class="rinfo"><div class="rtitle">'+h(x.song.id)+'</div>'+
        (x.song.jp?'<div class="rmem">'+h(x.song.jp)+'</div>':'')+
        '</div>'+
        '<span style="font-size:11px;font-weight:700;color:#C084FC;flex-shrink:0">'+Math.round(x.hp*100)+'%</span>'+
      '</div>';
    }).join('');
  }
  return '';
}

// ---- MAIN RENDER ----
function render(){
  const app=document.getElementById('app');
  if(st.step==='intro'){
    app.innerHTML=
      '<div class="hero">'+
        '<span class="badge">FIGHT! x REQUEST HOUR 2026</span>'+
        '<h1>Setlist Survey &middot; Prediksi &amp; Harapan</h1>'+
        '<div class="accent">Satu Suara, Satu Hak yang Sama</div>'+
        '<p>Distribusikan <strong>10 suara prediksi</strong> ke lagu yang menurutmu akan masuk Setlist Best 40. '+
        'Pilih juga lagu <strong>harapan</strong> dari 419 lagu yang bisa divote di RH2026.</p>'+
        '<div class="row" style="margin-top:14px">'+
          (!st.voted?'<button class="btn-red" data-action="btn-start">Mulai Vote &rarr;</button>':'')+
          '<button class="btn-ghost" data-action="btn-results">Lihat Hasil</button>'+
        '</div>'+
        (st.voted?'<div class="notice">&#10003; Kamu sudah vote. Terima kasih!</div>':'')+
      '</div>'+
      '<div class="credit">Survey independen oleh <span>@damnminica</span> &middot; Bukan hasil resmi &middot; JKT48 Request Hour 2026</div>';
    return;
  }

  if(st.step==='voting'){
    const t=totalP();
    const isP=st.vStep===0;
    app.innerHTML=
      '<div class="step-bar">'+
        '<div class="sdot done">&#10003;</div>'+
        '<span class="slabel on">Prediksi</span>'+
        '<div class="sline '+(isP?'off':'on')+'"></div>'+
        '<div class="sdot '+(isP?'idle':'active')+'">2</div>'+
        '<span class="slabel '+(isP?'off':'on')+'">Harapan</span>'+
      '</div>'+
      '<div class="section">'+
        '<h2>'+(isP?'Prediksi':'Harapan')+'</h2>'+
        '<div class="sub">'+(isP?
          'Klik lagu untuk mengalokasikan suara. Dari 52 lagu yang didukung resmi.':
          'Pilih maks. 3 lagu yang paling kamu harap masuk. Dari 419 lagu voting resmi.'
        )+'</div>'+
        (isP?
          '<div class="vcounter">'+
            '<div style="flex:1"><div class="vlabel">Total suara dialokasikan</div>'+
            '<div class="vbar-wrap"><div class="vbar" style="width:'+(t*10)+'%"></div></div></div>'+
            '<div style="text-align:right"><span class="vbig">'+t+'</span><span class="vsmall"> / 10</span><br>'+
            '<span class="vsmall">sisa '+rem()+' suara</span></div>'+
          '</div>':
          '<div class="vcounter"><div class="vlabel">Dipilih</div>'+
          '<span class="vbig" style="color:#3B82F6">'+Object.keys(st.harapan).length+'</span>'+
          '<span class="vsmall"> / '+MAX_H+'</span></div>'
        )+
        '<div class="search-box">'+
          '<span style="color:#9CA3AF;font-size:13px;margin-right:7px">&#9906;</span>'+
          '<input id="'+(isP?'sqP':'sqH')+'" placeholder="'+(isP?'Cari lagu atau member...':'Cari dari 419 lagu...')+'" '+
          'value="'+(isP?h(st.qP):h(st.qH))+'">'+
        '</div>'+
        '<div class="slist" id="song-list">'+buildList()+'</div>'+
        (isP?(t<10?'<div class="must-note">Alokasikan tepat 10 suara. Saat ini '+t+' suara.</div>':
          '<div class="ok-note">&#10003; 10 suara teralokasikan. Siap lanjut!</div>'):'')+
      '</div>'+
      '<div class="footer">'+
        '<button class="btn-ghost btn-sm" data-action="'+(isP?'btn-start':'btn-back-pred')+'">&#8592; Kembali</button>'+
        (isP?
          '<button class="btn-red btn-sm" '+(t!==10?'disabled':'')+' data-action="btn-next-harap">Lanjut ke Harapan &rarr;</button>':
          '<button class="btn-red btn-sm" '+(st.loading?'disabled':'')+' data-action="btn-submit">'+(st.loading?'Menyimpan...':'Submit Vote &#10003;')+'</button>'
        )+
      '</div>';
    return;
  }

  if(st.step==='results'){
    const total=(st.results&&st.results.total)||0;
    app.innerHTML=
      '<div class="hero">'+
        '<div class="row" style="justify-content:space-between">'+
          '<div><span class="badge">Hasil Survey Live</span>'+
          '<h1>Request Hour 2026 &middot; Suara Komunitas</h1></div>'+
          '<button class="btn-ghost btn-sm" data-action="btn-back-intro">&#8592; Kembali</button>'+
        '</div>'+
        '<div class="stat-row">'+
          '<div class="stat"><div class="stat-n">'+total+'</div><div class="stat-l">Total Voter</div></div>'+
          '<div class="stat"><div class="stat-n" style="color:#B0143C">10</div><div class="stat-l">Suara Prediksi/orang</div></div>'+
          '<div class="stat"><div class="stat-n" style="color:#818CF8">'+MAX_H+'</div><div class="stat-l">Harapan/orang</div></div>'+
        '</div>'+
      '</div>'+
      '<div class="tabbar">'+
        '<button class="tab '+(st.tab==='p'?'ap':'')+'" data-action="tab" data-tab="p">Prediksi (52)</button>'+
        '<button class="tab '+(st.tab==='h'?'ah':'')+'" data-action="tab" data-tab="h">Harapan (419)</button>'+
        '<button class="tab '+(st.tab==='gap'?'ag':'')+'" data-action="tab" data-tab="gap">Dark Horses</button>'+
        '<button class="btn-ghost btn-sm" style="margin-left:auto" data-action="btn-refresh">&#8635;</button>'+
      '</div>'+
      buildResults()+
      (!st.voted?
        '<div class="hero" style="margin-top:10px;text-align:center">'+
          '<div style="font-size:12px;color:#9CA3AF;margin-bottom:10px">Kamu belum vote.</div>'+
          '<button class="btn-red" data-action="btn-vote-now">Vote Sekarang &rarr;</button>'+
        '</div>':'')+
      '<div class="credit" style="margin-top:10px">Survey independen &middot; <span>@damnminica</span> &middot; Bukan hasil resmi JKT48 RH2026</div>';
  }
}

// ---- INIT ----
async function init(){
  st.vid=localStorage.getItem('rh2026_vid');
  if(!st.vid){st.vid=uid();localStorage.setItem('rh2026_vid',st.vid);}
  try{
    HARAPAN_SONGS=await api('/api/songs');
    const c=await api('/api/check/'+st.vid);
    if(c.voted){
      st.voted=true;
      st.results=await api('/api/results');
      st.step='results';
    }
  }catch(e){console.error('init error:',e);}
  render();
}

init();
</script>

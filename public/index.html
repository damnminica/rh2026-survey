<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>JKT48 RH2026 · Setlist Survey</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0A0808;color:#F9FAFB;font-family:'Segoe UI',Arial,sans-serif;min-height:100vh}
.wrap{max-width:620px;margin:0 auto;padding:14px}
.hero{background:#1C0D12;border:1px solid #3D1A26;border-radius:12px;padding:20px 18px;margin-bottom:12px}
.badge{display:inline-block;background:#B0143C;color:#FFF;font-size:10px;font-weight:700;padding:3px 10px;border-radius:4px;letter-spacing:1px;margin-bottom:8px}
.hero h1{font-size:19px;font-weight:700;margin:4px 0 3px}
.accent{font-size:13px;font-weight:600;color:#B0143C;margin-bottom:8px}
.hero p{font-size:12px;color:#9CA3AF;line-height:1.65;margin-bottom:14px}
.hero-btns{display:flex;gap:8px;flex-wrap:wrap}
.btn-red{background:#B0143C;color:#FFF;border:none;border-radius:8px;padding:10px 20px;font-size:13px;font-weight:600;cursor:pointer}
.btn-red:disabled{opacity:0.5;cursor:not-allowed}
.btn-ghost{background:transparent;color:#9CA3AF;border:1px solid #3D1A26;border-radius:8px;padding:10px 14px;font-size:13px;cursor:pointer}
.btn-sm{padding:6px 12px;font-size:11px;border-radius:6px}
.notice{font-size:11px;color:#86EFAC;margin-top:10px}
.credit{font-size:10px;color:#6B7280;text-align:center;margin-top:10px}
.credit span{color:#B0143C}

/* step bar */
.step-bar{display:flex;align-items:center;gap:6px;margin-bottom:12px}
.sdot{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0}
.sdot.done{background:#B0143C;border:1px solid #B0143C;color:#FFF}
.sdot.active{background:#B0143C66;border:1px solid #B0143C;color:#FFF}
.sdot.idle{background:#2A1520;border:1px solid #3D1A26;color:#9CA3AF}
.slabel{font-size:11px;font-weight:600}
.slabel.on{color:#F9FAFB}
.slabel.off{color:#9CA3AF}
.sline{flex:1;height:1px}
.sline.on{background:#B0143C}
.sline.off{background:#3D1A26}

/* section */
.section{background:#1C0D12;border:1px solid #3D1A26;border-radius:12px;padding:14px;margin-bottom:8px}
.section h2{font-size:15px;font-weight:700;margin-bottom:2px}
.section .sub{font-size:11px;color:#9CA3AF;margin-bottom:10px}

/* vote counter */
.vcounter{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding:8px 12px;background:#2A1520;border-radius:8px}
.vcounter-label{font-size:12px;color:#9CA3AF;flex:1}
.vbig{font-size:20px;font-weight:700;color:#B0143C}
.vsmall{font-size:11px;color:#9CA3AF}
.vbar-wrap{height:5px;background:#3D1A26;border-radius:3px;margin-top:4px;overflow:hidden}
.vbar{height:100%;background:#B0143C;border-radius:3px;transition:width 0.2s}

/* search */
.search{background:#2A1520;border:1px solid #3D1A26;border-radius:8px;display:flex;align-items:center;padding:7px 10px;margin-bottom:8px}
.search input{background:transparent;border:none;color:#F9FAFB;font-size:12px;flex:1;outline:none}
.search input::placeholder{color:#6B7280}
.clr{background:transparent;border:none;color:#9CA3AF;cursor:pointer;font-size:14px;padding:0}

/* song cards */
.slist{max-height:360px;overflow-y:auto;padding-right:2px}
.scard{display:flex;align-items:center;gap:8px;background:#2A1520;border:1px solid #3D1A26;border-radius:7px;padding:8px 10px;margin-bottom:5px;cursor:pointer;transition:border-color 0.15s}
.scard:hover{border-color:#6B2030}
.scard.has-votes{background:#B0143C14;border-color:#B0143C}
.scard.sel-h{background:#1E40AF14;border-color:#3B82F6}
.snum{font-size:10px;color:#9CA3AF;min-width:20px;text-align:right;font-weight:600;flex-shrink:0}
.sinfo{flex:1;min-width:0}
.stitle{font-size:11px;font-weight:600;color:#F9FAFB;line-height:1.3;margin-bottom:1px}
.smem{font-size:9.5px;color:#6B7280;line-height:1.3}
.vote-badge{background:#B0143C;color:#FFF;font-size:10px;font-weight:700;border-radius:4px;padding:2px 7px;flex-shrink:0}
.chk{color:#3B82F6;font-size:13px;flex-shrink:0}
.noresult{text-align:center;color:#9CA3AF;font-size:12px;padding:20px 0}
.must-note{font-size:11px;color:#EF4444;margin-top:6px;text-align:center}
.ok-note{font-size:11px;color:#86EFAC;margin-top:6px;text-align:center}

/* popup overlay */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px}
.popup{background:#1C0D12;border:1px solid #3D1A26;border-radius:12px;padding:20px;max-width:340px;width:100%}
.pop-title{font-size:13px;font-weight:700;color:#F9FAFB;margin-bottom:4px;line-height:1.4}
.pop-mem{font-size:10px;color:#9CA3AF;margin-bottom:16px}
.pop-sisa{font-size:11px;color:#9CA3AF;text-align:center;margin:8px 0}
.pop-sisa span{color:#B0143C;font-weight:700}
.stepper{display:flex;align-items:center;justify-content:center;gap:16px;margin:12px 0}
.step-btn{width:40px;height:40px;border-radius:50%;border:1px solid #3D1A26;background:#2A1520;color:#F9FAFB;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:300}
.step-btn:hover:not(:disabled){border-color:#B0143C;color:#B0143C}
.step-btn:disabled{opacity:0.3;cursor:not-allowed}
.step-num{font-size:36px;font-weight:700;color:#F9FAFB;min-width:50px;text-align:center}
.pop-btns{display:flex;gap:8px;margin-top:14px}
.pop-btns .btn-red{flex:1}
.pop-btns .btn-ghost{flex:0 0 auto}

/* footer */
.footer{background:#0F0A0C;border-top:1px solid #3D1A26;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;bottom:0;border-radius:0 0 12px 12px;margin-top:6px}

/* results */
.stat-row{display:flex;gap:8px;margin-top:12px}
.stat{background:#2A1520;border:1px solid #3D1A26;border-radius:8px;padding:10px 12px;flex:1;text-align:center}
.stat-n{font-size:20px;font-weight:700}
.stat-l{font-size:10px;color:#9CA3AF;margin-top:1px}
.tabbar{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.tab{padding:6px 13px;font-size:11px;font-weight:700;cursor:pointer;border-radius:7px;border:1px solid #3D1A26;background:transparent;color:#9CA3AF}
.tab.ap{border-color:#B0143C;background:#B0143C22;color:#B0143C}
.tab.ah{border-color:#3B82F6;background:#3B82F622;color:#60A5FA}
.tab.ag{border-color:#7B2D8B;background:#7B2D8B22;color:#C084FC}
.ritem{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:7px;background:#1C0D12;margin-bottom:4px;border:1px solid transparent}
.ritem.top3{background:#2A1520;border-color:#3D1A26}
.rank{font-size:10px;font-weight:700;min-width:18px;text-align:center;flex-shrink:0}
.r1{color:#FFD700}.r2{color:#C0C0C0}.r3{color:#CD7F32}.rn{color:#9CA3AF}
.rinfo{flex:1;min-width:0}
.rtitle{font-size:11px;font-weight:600;line-height:1.3;margin-bottom:1px}
.rmem{font-size:9px;color:#6B7280}
.bwrap{min-width:70px;height:4px;background:#2A1520;border-radius:2px;overflow:hidden}
.bfill{height:100%;border-radius:2px}
.rpct{font-size:10px;color:#9CA3AF;min-width:36px;text-align:right}
.rcnt{font-size:9px;color:#6B7280}
.gdesc{font-size:11px;color:#9CA3AF;margin-bottom:10px;line-height:1.5}
.gd{display:flex;gap:10px;margin-top:2px}
.gp{font-size:9px;color:#B0143C}.gh{font-size:9px;color:#C084FC}

/* loading */
.loading{display:flex;align-items:center;justify-content:center;min-height:180px;color:#9CA3AF;font-size:13px;gap:8px}
.spin{width:16px;height:16px;border:2px solid #3D1A26;border-top-color:#B0143C;border-radius:50%;animation:sp 0.7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
@media(max-width:480px){.wrap{padding:10px}.hero{padding:16px 14px}}
</style>
</head>

      <button class="btn-red" onclick="applyVote()">Terapkan ✓</button>

  </div>
</div>

const MAX_H=3;

// STATE
let st={
  step:'intro', vStep:0,
  prediksi:{},       // {songId: voteCount}  total must = 10
  harapan:new Set(), // Set of song codes from 419
  results:null, loading:false,
  vid:null, voted:false, tab:'p', qP:'', qH:'',
  popSong:null, popTmp:0
};

const totalPrediksi=()=>Object.values(st.prediksi).reduce((a,b)=>a+b,0);
const rem=()=>10-totalPrediksi();
const uid=()=>Math.random().toString(36).slice(2)+Date.now().toString(36);
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const el=id=>document.getElementById(id);

async function api(path,opts){
  const r=await fetch(path,opts);
  if(!r.ok)throw new Error(await r.text());
  return r.json();
}

async function init(){
  st.vid=localStorage.getItem('rh2026_vid');
  if(!st.vid){st.vid=uid();localStorage.setItem('rh2026_vid',st.vid);}
  try{
    const c=await api('/api/check/'+st.vid);
    if(c.voted){
      st.voted=true;
      const r=await api('/api/results');
      st.results=r; st.step='results';
    }
  }catch{}
  render();
}

// POPUP
function openPopup(song){
  st.popSong=song;
  st.popTmp=st.prediksi[song.id]||0;
  el('pop-title').textContent=song.song;
  el('pop-mem').textContent=song.members;
  updatePopup();
  el('overlay').style.display='flex';
}
function updatePopup(){
  const r=rem();
  const cur=st.popTmp;
  el('pop-num').textContent=cur;
  el('pop-sisa').textContent=(r+(st.prediksi[st.popSong.id]||0)-cur);
  el('pop-minus').disabled=(cur<=0);
  el('pop-plus').disabled=(r+(st.prediksi[st.popSong.id]||0)-cur<=0);
}
function adjVote(d){
  const prev=st.prediksi[st.popSong.id]||0;
  const available=rem()+prev;
  const next=Math.max(0,Math.min(available,st.popTmp+d));
  st.popTmp=next;
  updatePopup();
}
function applyVote(){
  const id=st.popSong.id;
  if(st.popTmp===0) delete st.prediksi[id];
  else st.prediksi[id]=st.popTmp;
  closePopup();
  render();
}
function closePopup(){el('overlay').style.display='none';st.popSong=null;}
function overlayClick(e){if(e.target===el('overlay'))closePopup();}

// HARAPAN toggle
function toggleH(code){
  if(st.harapan.has(code)) st.harapan.delete(code);
  else if(st.harapan.size<MAX_H) st.harapan.add(code);
  render();
}

async function submitVote(){
  if(totalPrediksi()!==10){alert('Total suara prediksi harus tepat 10. Saat ini: '+totalPrediksi());return;}
  st.loading=true;render();
  try{
    const r=await api('/api/vote',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({vid:st.vid,p:st.prediksi,h:[...st.harapan]})});
    st.results=r.results||await api('/api/results');
    st.voted=true;st.step='results';
  }catch(e){alert('Gagal submit: '+e.message);}
  st.loading=false;render();
}

async function loadResults(){
  st.loading=true;render();
  try{st.results=await api('/api/results');}catch{}
  st.step='results';st.loading=false;render();
}

// RENDER HELPERS
function renderStepBar(vs){
  return `<div class="step-bar">
    <div class="sdot ${vs>=0?'done':'idle'}">✓</div>
    <span class="slabel ${vs>=0?'on':'off'}">Prediksi</span>
    <div class="sline ${vs>0?'on':'off'}"></div>
    <div class="sdot ${vs>0?'active':'idle'}">${vs>0?'2':'2'}</div>
    <span class="slabel ${vs>0?'on':'off'}">Harapan</span>
  </div>`;
}

function renderPrediksiList(){
  const q=st.qP.toLowerCase();
  const songs=q?PRED_SONGS.filter(s=>s.song.toLowerCase().includes(q)||s.members.toLowerCase().includes(q)):PRED_SONGS;
  if(!songs.length)return`<div class="noresult">Tidak ada hasil</div>`;
  return songs.map(s=>{
    const v=st.prediksi[s.id]||0;
    return`<div class="scard ${v>0?'has-votes':''}" onclick="openPopup(PRED_SONGS[${s.id-1}])">
      <span class="snum">${s.id}</span>
      <div class="sinfo">
        <div class="stitle">${esc(s.song)}</div>
        <div class="smem">${esc(s.members)}</div>
      </div>
      ${v>0?`<span class="vote-badge">${v} suara</span>`:''}
    </div>`;
  }).join('');
}

function renderHarapanList(){
  const q=st.qH.toLowerCase();
  const songs=q?HARAPAN_SONGS.filter(s=>s.id.toLowerCase().includes(q)||(s.jp&&s.jp.toLowerCase().includes(q))):HARAPAN_SONGS;
  if(!songs.length)return`<div class="noresult">Tidak ada hasil untuk "${esc(st.qH)}"</div>`;
  return songs.map((s,i)=>{
    const sel=st.harapan.has(s.code);
    const dis=!sel&&st.harapan.size>=MAX_H;
    return`<div class="scard ${sel?'sel-h':''}" style="opacity:${dis?0.4:1};cursor:${dis?'default':'pointer'}" onclick="${dis?'':'toggleH(''+s.code+'')'}">
      <div class="sinfo">
        <div class="stitle">${esc(s.id)}</div>
        ${s.jp?`<div class="smem">${esc(s.jp)}</div>`:''}
      </div>
      ${sel?'<span class="chk">✓</span>':''}
    </div>`;
  }).join('');
}

function renderResults(tab,res){
  if(!res)return`<div class="loading"><div class="spin"></div> Memuat…</div>`;
  const{pc,hc,total}=res;
  if(!total)return`<div class="noresult" style="padding:32px 0">Belum ada vote.</div>`;

  if(tab==='gap'){
    const all=HARAPAN_SONGS.map(s=>({
      code:s.code,title:s.id,
      hp:hc[s.code]?hc[s.code]/total:0,
      pp:0 // harapan vs pred not directly comparable, show harapan vs "expected"
    }));
    const hcByPredId={};
    PRED_SONGS.forEach(s=>{if(pc[s.id])hcByPredId[s.song.split('/')[0].trim()]=pc[s.id];});
    const gapped=HARAPAN_SONGS
      .filter(s=>hc[s.code]>0)
      .map(s=>({code:s.code,title:s.id,jp:s.jp,cnt:hc[s.code]||0,pct:(hc[s.code]||0)/total}))
      .sort((a,b)=>b.cnt-a.cnt).slice(0,20);
    if(!gapped.length)return`<div class="noresult" style="padding:24px 0">Belum ada data harapan.</div>`;
    const maxP=gapped[0].pct||1;
    return`<div class="gdesc">Lagu dari 419 daftar yang paling banyak diharap fans — dari hati, bukan dari campaign yang ada.</div>`+
    gapped.map((s,i)=>`<div class="ritem ${i<3?'top3':''}">
      <span class="rank ${i===0?'r1':i===1?'r2':i===2?'r3':'rn'}">#${i+1}</span>
      <div class="rinfo">
        <div class="rtitle">${esc(s.title)}</div>
        ${s.jp?`<div class="rmem">${esc(s.jp)}</div>`:''}
      </div>
      <div class="bwrap"><div class="bfill" style="width:${(s.pct/maxP)*100}%;background:#C084FC"></div></div>
      <span class="rpct">${Math.round(s.pct*100)}%</span>
      <span class="rcnt">(${s.cnt})</span>
    </div>`).join('');
  }

  if(tab==='p'){
    const ranked=PRED_SONGS
      .map(s=>({...s,cnt:pc[s.id]||0}))
      .filter(s=>s.cnt>0)
      .sort((a,b)=>b.cnt-a.cnt);
    if(!ranked.length)return`<div class="noresult" style="padding:24px 0">Belum ada data.</div>`;
    const maxCnt=ranked[0].cnt||1;
    return ranked.map((s,i)=>`<div class="ritem ${i<3?'top3':''}">
      <span class="rank ${i===0?'r1':i===1?'r2':i===2?'r3':'rn'}">#${i+1}</span>
      <div class="rinfo">
        <div class="rtitle">${esc(s.song)}</div>
        <div class="rmem">${esc(s.members)}</div>
      </div>
      <div class="bwrap"><div class="bfill" style="width:${(s.cnt/maxCnt)*100}%;background:#B0143C"></div></div>
      <span class="rpct">${s.cnt} suara</span>
    </div>`).join('');
  }

  if(tab==='h'){
    const ranked=HARAPAN_SONGS
      .map(s=>({...s,cnt:hc[s.code]||0,pct:(hc[s.code]||0)/total}))
      .filter(s=>s.cnt>0)
      .sort((a,b)=>b.cnt-a.cnt).slice(0,30);
    if(!ranked.length)return`<div class="noresult" style="padding:24px 0">Belum ada data.</div>`;
    const maxPct=ranked[0].pct||1;
    return ranked.map((s,i)=>`<div class="ritem ${i<3?'top3':''}">
      <span class="rank ${i===0?'r1':i===1?'r2':i===2?'r3':'rn'}">#${i+1}</span>
      <div class="rinfo">
        <div class="rtitle">${esc(s.id)}</div>
        ${s.jp?`<div class="rmem">${esc(s.jp)}</div>`:''}
      </div>
      <div class="bwrap"><div class="bfill" style="width:${(s.pct/maxPct)*100}%;background:#3B82F6"></div></div>
      <span class="rpct">${Math.round(s.pct*100)}%</span>
      <span class="rcnt">(${s.cnt})</span>
    </div>`).join('');
  }
}

  const app=el('app');
  const t=totalPrediksi();
  const r=10-t;

  if(st.step==='intro'){
    app.innerHTML=`

  if(st.step==='voting'){
    if(st.vStep===0){
      app.innerHTML=`
      ${renderStepBar(0)}
      <div class="section">
        <h2>Prediksi</h2>
        <div class="sub">Klik lagu untuk mengalokasikan suara. Dari 52 lagu yang didukung resmi.</div>
        <div class="vcounter">
          <div style="flex:1">
            <div class="vcounter-label">Total suara dialokasikan</div>
            <div class="vbar-wrap"><div class="vbar" style="width:${t*10}%"></div></div>
          </div>
          <div style="text-align:right">
            <span class="vbig">${t}</span><span class="vsmall"> / 10</span><br>
            <span class="vsmall">sisa ${r} suara</span>
          </div>
        </div>
        <div class="search">
          <span style="color:#9CA3AF;font-size:13px;margin-right:7px">⌕</span>
          <input placeholder="Cari lagu atau member…" value="${esc(st.qP)}" oninput="st.qP=this.value;render()" id="sqP">
          ${st.qP?'<button class="clr" onclick="st.qP='';render()">×</button>':''}
        </div>
        <div class="slist">${renderPrediksiList()}</div>
        ${t<10?`<div class="must-note">Alokasikan tepat 10 suara. Saat ini ${t} suara.</div>`:''}
        ${t===10?'<div class="ok-note">✓ 10 suara teralokasikan. Siap lanjut!</div>':''}
      </div>
      <div class="footer">
        <button class="btn-ghost btn-sm" onclick="st.step='intro';render()">← Kembali</button>
        <button class="btn-red btn-sm" ${t!==10?'disabled':''} onclick="st.vStep=1;render()">Lanjut ke Harapan →</button>
      </div>`;
      const sq=el('sqP');if(sq)sq.focus();
    } else {
      app.innerHTML=`
      ${renderStepBar(1)}
      <div class="section">
        <h2>Harapan</h2>
        <div class="sub">Pilih maks. 3 lagu yang paling kamu harap masuk — dari 419 lagu yang bisa divote di RH2026.</div>
        <div class="vcounter">
          <div style="flex:1">
            <div class="vcounter-label">Lagu harapan dipilih</div>
          </div>
          <div style="text-align:right">
            <span class="vbig" style="color:#3B82F6">${st.harapan.size}</span>
            <span class="vsmall"> / ${MAX_H}</span>
          </div>
        </div>
        <div class="search">
          <span style="color:#9CA3AF;font-size:13px;margin-right:7px">⌕</span>
          <input placeholder="Cari dari 419 lagu…" value="${esc(st.qH)}" oninput="st.qH=this.value;render()" id="sqH">
          ${st.qH?'<button class="clr" onclick="st.qH='';render()">×</button>':''}
        </div>
        <div class="slist">${renderHarapanList()}</div>
      </div>
      <div class="footer">
        <button class="btn-ghost btn-sm" onclick="st.vStep=0;render()">← Kembali</button>
        <button class="btn-red btn-sm" ${st.loading?'disabled':''} onclick="submitVote()">${st.loading?'Menyimpan…':'Submit Vote ✓'}</button>
      </div>`;
      const sq=el('sqH');if(sq)sq.focus();
    }
    return;
  }

  if(st.step==='results'){
    const total=st.results?.total||0;
    app.innerHTML=`
    <div class="hero">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
        <div>
          <span class="badge">Hasil Survey Live</span>
          <h1>Request Hour 2026 · Suara Komunitas</h1>
        </div>
        <button class="btn-ghost btn-sm" onclick="st.step='intro';render()">← Kembali</button>
      </div>
      <div class="stat-row">
        <div class="stat"><div class="stat-n">${total}</div><div class="stat-l">Total Voter</div></div>
        <div class="stat"><div class="stat-n" style="color:#B0143C">10</div><div class="stat-l">Suara Prediksi/orang</div></div>
        <div class="stat"><div class="stat-n" style="color:#818CF8">${MAX_H}</div><div class="stat-l">Harapan/orang</div></div>
      </div>
    </div>
    <div class="tabbar">
      <button class="tab ${st.tab==='p'?'ap':''}" onclick="st.tab='p';render()">Prediksi (52)</button>
      <button class="tab ${st.tab==='h'?'ah':''}" onclick="st.tab='h';render()">Harapan (419)</button>
      <button class="tab ${st.tab==='gap'?'ag':''}" onclick="st.tab='gap';render()">Dark Horses</button>
      <button class="btn-ghost btn-sm" style="margin-left:auto" onclick="loadResults()">↻</button>
    </div>
    ${renderResults(st.tab,st.results)}
    ${!st.voted?`<div class="hero" style="margin-top:10px;text-align:center">
      <div style="font-size:12px;color:#9CA3AF;margin-bottom:10px">Kamu belum vote.</div>
      <button class="btn-red" onclick="st.step='voting';st.vStep=0;render()">Vote Sekarang →</button>
    </div>`:''}
    <div class="credit" style="margin-top:10px">Survey independen · <span>@damnminica</span> · Bukan hasil resmi JKT48 Request Hour 2026</div>`;
  }
}

init();
</script>
</body>
</html>
